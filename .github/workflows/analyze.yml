name: Analyze

on:
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          cache: true

      - run: flutter pub get

      - run: flutter gen-l10n

      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
