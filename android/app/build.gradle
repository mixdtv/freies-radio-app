plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "de.radiozeit.freiesradio"
    compileSdkVersion 35
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "de.radiozeit.freiesradio"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        archivesBaseName = "freiesradio-v$versionCode($versionName)"
    }

    flavorDimensions "distribution"
    productFlavors {
        play {
            dimension "distribution"
        }
        fdroid {
            dimension "distribution"
            // Separate install from the Play build so the two channels can
            // coexist with different signing keys (F-Droid signs with its
            // own key; Play uses key.jks).
            applicationIdSuffix ".fdroid"
        }
    }

    signingConfigs {
        release {
            storeFile file("key.jks")
            storePassword System.getenv("ANDROID_STORE_PASSWORD") ?: localProperties.getProperty('android.storePassword')
            keyAlias "freies-radio"
            keyPassword System.getenv("ANDROID_KEY_PASSWORD") ?: localProperties.getProperty('android.keyPassword')
        }
    }

    buildTypes {
        release {
            // F-Droid's buildserver has no keystore — leave release unsigned
            // there and let F-Droid sign with its own key post-build.
            // Local + CI builds have key.jks and supply the password via
            // env vars or local.properties (looked up in signingConfigs above).
            if (file("key.jks").exists()) {
                signingConfig signingConfigs.release
            }
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
    }

    experimentalProperties["android.experimental.art.profileBasedDexLayout"] = true
    experimentalProperties["android.experimental.enablePageSizeConfig"] = true
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
}
